name: Main Build and Containerize

on:
  push:
    branches:
      - main

jobs:
  build-container:
    name: Build JAR and Docker Image
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/finsight-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: ./mvnw -q -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: finsight-app-jar
          path: backend/finsight-app/target/*.jar

      - name: Build Docker image
        run: docker build -t finsight-app:latest .