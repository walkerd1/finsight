name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/finsight-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run unit tests
        run: bash ./mvnw -q test

      - name: Build JAR
        run: bash ./mvnw -q -DskipTests package